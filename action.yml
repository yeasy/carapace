name: 'Carapace Security Scan'
description: 'Runtime security scanning for AI agent projects'

inputs:
  block-on-critical:
    description: 'Block the build on critical security findings'
    required: false
    default: 'true'
  config-path:
    description: 'Path to .carapace.yml config file'
    required: false
    default: '.carapace.yml'
  scan-path:
    description: 'Path to scan'
    required: false
    default: '.'
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '20'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install dependencies
      shell: bash
      run: npm install

    - name: Build
      shell: bash
      run: npm run build

    - name: Run Carapace Scan
      shell: bash
      working-directory: ${{ inputs.scan-path }}
      run: |
        npx carapace scan --config ${{ inputs.config-path }}

    - name: Check for critical findings
      if: inputs.block-on-critical == 'true'
      shell: bash
      run: |
        echo "Critical security check enabled"
