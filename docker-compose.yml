version: '3.8'

services:
  demo:
    build: .
    command: ["node", "packages/cli/dist/index.js", "demo", "--port", "9877"]
    ports:
      - "9877:9877"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  dashboard:
    build: .
    command: ["node", "packages/cli/dist/index.js", "dashboard", "--port", "9877"]
    ports:
      - "9877:9877"
    volumes:
      - carapace-data:/root/.carapace
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    profiles:
      - dashboard

volumes:
  carapace-data:
