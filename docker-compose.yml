services:
  # Default: one-click demo with simulated attacks + dashboard
  demo:
    image: ghcr.io/yeasy/carapace:latest
    build: .
    command: ["demo", "--port", "9877", "--host", "0.0.0.0"]
    ports:
      - "127.0.0.1:9877:9877"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  # Standalone dashboard (use: docker-compose --profile dashboard up)
  dashboard:
    image: ghcr.io/yeasy/carapace:latest
    build: .
    command: ["dashboard", "--port", "9878", "--host", "0.0.0.0"]
    ports:
      - "127.0.0.1:9878:9878"
    volumes:
      - carapace-data:/app/.carapace
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    profiles:
      - dashboard

volumes:
  carapace-data:
