version: '3.8'

services:
  # Default: one-click demo with simulated attacks + dashboard
  demo:
    image: ghcr.io/yeasy/carapace:latest
    build: .
    command: ["node", "packages/cli/dist/index.js", "demo", "--port", "9877"]
    ports:
      - "9877:9877"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  # Standalone dashboard (use: docker-compose --profile dashboard up)
  dashboard:
    image: ghcr.io/yeasy/carapace:latest
    build: .
    command: ["node", "packages/cli/dist/index.js", "dashboard", "--port", "9878"]
    ports:
      - "9878:9878"
    volumes:
      - carapace-data:/root/.carapace
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    profiles:
      - dashboard

volumes:
  carapace-data:
